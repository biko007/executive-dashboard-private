const typeIcon = (type) => {
  switch (type) {
    case "reel": return "\ud83c\udfac";
    case "carousel": return "\ud83d\udcf8";
    case "image": return "\ud83d\uddbc\ufe0f";
    case "story": return "\ud83d\udcf1";
    default: return "\ud83d\udcc4";
  }
};

const statusBadge = (status) => {
  const styles = {
    idea:      { bg: "#2a2a3e", color: "#8888aa", label: "Idee" },
    draft:     { bg: "#1a2a3a", color: "#4a9eff", label: "Entwurf" },
    review:    { bg: "#2a2a1a", color: "#e8b830", label: "Review" },
    ready:     { bg: "#1a2a1a", color: "#4ade80", label: "Bereit" },
    published: { bg: "#1a2a2a", color: "#2dd4bf", label: "Live" },
  };
  const s = styles[status] || styles.idea;
  return (
    <span style={{
      background: s.bg, color: s.color,
      padding: "2px 8px", borderRadius: "4px",
      fontSize: "11px", fontWeight: 600,
      letterSpacing: "0.5px", textTransform: "uppercase",
    }}>{s.label}</span>
  );
};

const MiniChart = ({ data, color, height = 48, showArea = true }) => {
  const values = data.map(d => d.value);
  const min = Math.min(...values) * 0.995;
  const max = Math.max(...values) * 1.005;
  const w = 200, h = height;
  const points = values.map((v, i) => ({
    x: (i / (values.length - 1)) * w,
    y: h - ((v - min) / (max - min)) * h,
  }));
  const line = points.map((p, i) => `${i === 0 ? "M" : "L"}${p.x},${p.y}`).join(" ");
  const area = `${line} L${w},${h} L0,${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height }}>
      {showArea && <path d={area} fill={`${color}15`} />}
      <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {points.map((p, i) => i === points.length - 1 && (
        <circle key={i} cx={p.x} cy={p.y} r="3" fill={color} />
      ))}
    </svg>
  );
};

const KPICard = ({ label, value, sub, trend, chart }) => (
  <div style={{
    background: "#141420", borderRadius: "12px",
    padding: "16px 20px", border: "1px solid #1e1e30",
    flex: 1, minWidth: 0,
  }}>
    <div style={{ color: "#666680", fontSize: "11px", fontWeight: 600, letterSpacing: "1px", textTransform: "uppercase", marginBottom: "8px" }}>
      {label}
    </div>
    <div style={{ display: "flex", alignItems: "baseline", gap: "8px" }}>
      <span style={{ color: "#e8e8f0", fontSize: "28px", fontWeight: 700, fontFamily: "'DM Sans', sans-serif" }}>{value}</span>
      {trend && (
        <span style={{
          color: trend.startsWith("+") ? "#4ade80" : "#f87171",
          fontSize: "13px", fontWeight: 600,
        }}>{trend}</span>
      )}
    </div>
    {sub && <div style={{ color: "#555568", fontSize: "12px", marginTop: "2px" }}>{sub}</div>}
    {chart && <div style={{ marginTop: "10px" }}>{chart}</div>}
  </div>
);

function InstagramDashboard() {

          }}>{"\ud83d\udcf7"}</div>

            <div style={{ fontSize: "20px", fontWeight: 700 }}>Instagram</div>

          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
          <div style={{

            padding: "6px 12px", borderRadius: "8px", fontSize: "12px",

      {/* Tab Navigation */}
      <div style={{ display: "flex", gap: "4px", marginBottom: "24px", borderBottom: "1px solid #1e1e30", paddingBottom: "0" }}>
        {[
          { id: "overview", label: "\u00dcbersicht" },
          { id: "content",  label: "Content-Plan" },
          { id: "drafts",   label: "Drafts" },
          { id: "analytics", label: "Analyse" },

                  padding: "6px 14px", borderRadius: "8px", fontSize: "12px", fontFamily: "inherit",

                Follower-Entwicklung (30 Tage)

              <div style={{ display: "flex", justifyContent: "space-between", marginTop: "8px" }}>

                        background: idx === d.engagementHistory.length - 1

              Performance nach Content-Typ

              {[
                { type: "Reels",     icon: "\ud83c\udfac", engagement: 4.8, reach: 8200, color: "#f87171" },
                { type: "Carousels", icon: "\ud83d\udcf8", engagement: 3.2, reach: 5400, color: "#e8b830" },

                  <div style={{ fontSize: "13px", fontWeight: 600, color: "#d0d0e0", marginBottom: "8px" }}>{ct.type}</div>
                  <div style={{ fontSize: "22px", fontWeight: 700, color: ct.color, marginBottom: "2px" }}>{ct.engagement}%</div>
                  <div style={{ fontSize: "11px", color: "#555568" }}>{"\u00d8"} Engagement</div>
                  <div style={{ fontSize: "12px", color: "#888898", marginTop: "8px" }}>{ct.reach.toLocaleString("de-DE")} Reach</div>
                </div>
              ))}
            </div>
          </div>

          {/* AI Recommendation */}
          <div style={{
            background: "linear-gradient(135deg, #1a1535, #141420)",
            borderRadius: "12px", border: "1px solid #2a2050", padding: "20px",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "12px" }}>
              <span style={{ fontSize: "16px" }}>{"\ud83e\udd16"}</span>
              <div style={{ fontSize: "13px", fontWeight: 700, color: "#8868e8", letterSpacing: "1px", textTransform: "uppercase" }}>
                KI-Empfehlung
              </div>
            </div>
            <div style={{ fontSize: "13px", color: "#c0c0d8", lineHeight: "1.7" }}>
              Deine Reels performen 2.5x besser als Bilder. Empfehlung: Fokus auf kurze Reels (15–30s) mit Investment-Tipps — die haben die h&ouml;chste Engagement-Rate. Optimaler Posting-Zeitpunkt: Dienstag und Donnerstag zwischen 18:00–19:00 Uhr. Carousels mit Mehrwert-Content (z.B. &quot;5 Tipps&quot;) performen als zweitbestes Format.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<InstagramDashboard />);
</script>
</body>
</html>
