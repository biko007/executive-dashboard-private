<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Dashboard</title>
<style>
:root {
  --bg:      #0f1117;
  --surface: #161b26;
  --border:  #272d3d;
  --text:    #e2e8f0;
  --muted:   #7a8499;
  --accent:  #4f9cf9;
  --green:   #4ade80;
  --yellow:  #fbbf24;
  --red:     #f87171;
  --r:       8px;
  --font:    -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

/* ── Login ── */
#login { display: none; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 40px 36px; width: 340px; }
.login-box h2 { font-size: 20px; margin-bottom: 6px; }
.login-box p  { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
.login-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: var(--text); font-size: 14px; margin-bottom: 12px; outline: none; }
.login-box input:focus { border-color: var(--accent); }
.login-err { color: var(--red); font-size: 13px; margin-top: 8px; min-height: 18px; }

/* ── App shell ── */
#app { display: none; min-height: 100vh; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
header h1 { font-size: 16px; font-weight: 600; color: var(--accent); letter-spacing: .3px; }
.header-meta { display: flex; align-items: center; gap: 16px; }
.header-meta span { color: var(--muted); font-size: 12px; }
.btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.btn-logout:hover { border-color: var(--red); color: var(--red); }

nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; gap: 2px; }
nav button { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); padding: 11px 14px; cursor: pointer; font-size: 13px; font-family: var(--font); transition: color .12s; white-space: nowrap; }
nav button:hover { color: var(--text); }
nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

main { padding: 24px; max-width: 1200px; }

/* ── Utilities ── */
.btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-family: var(--font); transition: opacity .12s, background .12s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: .85; }
.btn-danger { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.25); }
.btn-danger:hover { background: rgba(248,113,113,.25); }

.badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
.badge-green  { background: rgba(74,222,128,.12); color: var(--green); }
.badge-yellow { background: rgba(251,191,36,.12); color: var(--yellow); }
.badge-red    { background: rgba(248,113,113,.12); color: var(--red); }
.badge-blue   { background: rgba(79,156,249,.12);  color: var(--accent); }
.badge-muted  { background: rgba(255,255,255,.06); color: var(--muted); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 16px; }
.card-pad { padding: 20px; }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 14px; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(255,255,255,.018); }

.spinner { color: var(--muted); padding: 60px; text-align: center; font-size: 15px; }
.empty   { color: var(--muted); padding: 60px; text-align: center; }

/* ── Summary cards ── */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
.s-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; }
.s-card .lbl { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
.s-card .val { font-size: 26px; font-weight: 700; line-height: 1; }
.s-card .sub { color: var(--muted); font-size: 12px; margin-top: 5px; }

/* ── Trip cards ── */
.trip-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; margin-bottom: 12px; }
.trip-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.trip-top h3 { font-size: 16px; font-weight: 600; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.trip-dates { color: var(--muted); font-size: 13px; }
.trip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.trip-grid .mi { font-size: 13px; }
.trip-grid .ml { color: var(--muted); }
.segments { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.seg-header { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
.seg-row { font-size: 13px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.04); display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
.seg-row:last-child { border-bottom: none; }

/* ── Calendar ── */
.day-group { margin-bottom: 22px; }
.day-lbl { font-weight: 600; color: var(--accent); font-size: 14px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.ev-row { display: flex; gap: 14px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; }
.ev-time { color: var(--muted); font-size: 12px; white-space: nowrap; min-width: 110px; padding-top: 1px; }
.ev-body { min-width: 0; }
.ev-title { font-size: 14px; font-weight: 500; }
.ev-sub { color: var(--muted); font-size: 12px; margin-top: 3px; }

/* ── Draft body ── */
.draft-body-row td { padding: 0 14px 12px; }
.draft-body { background: var(--bg); border-radius: 6px; padding: 14px; font-family: monospace; font-size: 12px; white-space: pre-wrap; color: var(--muted); border: 1px solid var(--border); }

/* ── Documents ── */
.doc-toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.doc-toolbar select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 13px; font-family: var(--font); outline: none; }
.doc-toolbar select:focus { border-color: var(--accent); }
.drop-zone { border: 2px dashed var(--border); border-radius: var(--r); padding: 32px; text-align: center; color: var(--muted); font-size: 14px; cursor: pointer; transition: border-color .15s, background .15s; margin-bottom: 8px; }
.drop-zone.drag-over { border-color: var(--accent); background: rgba(79,156,249,.06); }
.doc-trip-link { color: var(--accent); cursor: pointer; text-decoration: none; }
.doc-trip-link:hover { text-decoration: underline; }

/* ── Modal ── */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:100; display:flex; align-items:center; justify-content:center; animation:fadeIn .15s ease; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); width:560px; max-width:95vw; max-height:90vh; overflow-y:auto; padding:28px; animation:slideUp .2s ease; }
.modal h3 { font-size:17px; margin-bottom:18px; }
.modal label { display:block; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px; margin-top:14px; }
.modal input, .modal textarea, .modal select { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:9px 12px; color:var(--text); font-size:14px; font-family:var(--font); outline:none; }
.modal input:focus, .modal textarea:focus, .modal select:focus { border-color:var(--accent); }
.modal textarea { min-height:120px; resize:vertical; }
.modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:22px; padding-top:16px; border-top:1px solid var(--border); }
.btn-ghost { background:none; border:1px solid var(--border); color:var(--muted); padding:7px 16px; border-radius:6px; cursor:pointer; font-size:13px; font-family:var(--font); }
.btn-ghost:hover { border-color:var(--text); color:var(--text); }
.seg-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,.04); font-size:13px; }
.seg-item:last-child { border-bottom:none; }
.seg-item .seg-rm { background:none; border:none; color:var(--red); cursor:pointer; font-size:15px; padding:2px 4px; }

/* ── Fleet cards ── */
.fleet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.fleet-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; }
.fleet-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.fleet-card-header .fleet-icon { font-size: 28px; }
.fleet-card-header h3 { font-size: 15px; font-weight: 600; flex: 1; min-width: 0; }
.fleet-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 13px; }
.fleet-meta .fl { color: var(--muted); }
.fleet-actions { display: flex; gap: 6px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
.tuev-green  { color: var(--green); }
.tuev-yellow { color: var(--yellow); }
.tuev-red    { color: var(--red); }
.tuev-none   { color: var(--muted); }
</style>
</head>
<body>

<!-- ── Login ─────────────────────────────────────────────────────────────── -->
<div id="login">
  <div class="login-box">
    <h2>⚙️ Executive Dashboard</h2>
    <p>Zugangstoken eingeben</p>
    <input type="password" id="tokenInput" placeholder="DASHBOARD_TOKEN" autocomplete="off">
    <button class="btn btn-primary" style="width:100%;padding:10px" onclick="submitToken()">Anmelden</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ── App ───────────────────────────────────────────────────────────────── -->
<div id="app">
  <header>
    <h1>⚙️ Executive Dashboard &nbsp;<span style="color:var(--muted);font-weight:400;font-size:13px">Hans Dampf</span></h1>
    <div class="header-meta">
      <span id="lastUpdate"></span>
      <button class="btn-logout" onclick="logout()">Abmelden</button>
    </div>
  </header>
  <nav>
    <button onclick="showTab('trips')"    class="active">✈️ Trips</button>
    <button onclick="showTab('health')"          >🏥 Health</button>
    <button onclick="showTab('drafts')"          >📬 Drafts</button>
    <button onclick="showTab('calendar')"        >📅 Kalender</button>
    <button onclick="showTab('documents')"       >📁 Dokumente</button>
    <button onclick="showTab('sharepoint')"      >📂 SharePoint</button>
    <button onclick="showTab('fleet')"           >🚗 Fuhrpark</button>
  </nav>
  <main id="content">
    <div class="spinner">Laden…</div>
  </main>
</div>

<script>
'use strict';

/* ── State ── */
let TOKEN = '';
let currentTab = 'trips';
let _tripsCache = [];
let _draftsCache = [];
let _docsCache = [];

/* ── Init ── */
(function init() {
  const p = new URLSearchParams(location.search);
  const urlToken = p.get('token');
  if (urlToken) {
    TOKEN = urlToken;
      localStorage.setItem('token', urlToken);
    history.replaceState({}, '', location.pathname);
  }
  TOKEN = localStorage.getItem('token') || '';
  if (TOKEN) {
    showApp();
    showTab('trips');
  } else {
    document.getElementById('login').style.display = 'flex';
  }
})();

document.getElementById('tokenInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') submitToken();
});

async function submitToken() {
  const v = document.getElementById('tokenInput').value.trim();
  if (!v) return;
  TOKEN = v;
  try {
    await apiFetch('/api/trips');
    localStorage.setItem('token', TOKEN);
    document.getElementById('login').style.display = 'none';
    showApp();
    showTab('trips');
  } catch {
    document.getElementById('loginErr').textContent = 'Token ungültig oder Server nicht erreichbar.';
    TOKEN = '';
  }
}

function logout() {
  localStorage.removeItem('token');
  TOKEN = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('tokenInput').value = '';
  document.getElementById('loginErr').textContent = '';
  document.getElementById('login').style.display = 'flex';
}

function showApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

/* ── Tab routing ── */
function showTab(tab) {
  currentTab = tab;
  const tabs = ['trips','health','drafts','calendar','documents','sharepoint','fleet'];
  document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('active', tabs[i] === tab));
  document.getElementById('lastUpdate').textContent = '';
  document.getElementById('content').innerHTML = '<div class="spinner">Laden…</div>';
  ({ trips: loadTrips, health: loadHealth, drafts: loadDrafts, calendar: loadCalendar, documents: loadDocuments, sharepoint: loadSharePoint, fleet: loadFleet })[tab]();
}

/* ── Fetch helper ── */
async function apiFetch(url, opts = {}) {
  const sep = url.includes('?') ? '&' : '?';
  const res = await fetch('/dashboard' + url + sep + 'token=' + encodeURIComponent(TOKEN), opts);
  if (res.status === 401) { logout(); throw new Error('401'); }
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

/* ── Helpers ── */
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDate = iso => iso ? new Intl.DateTimeFormat('de-DE',{timeZone:'Europe/Berlin',day:'2-digit',month:'2-digit',year:'numeric'}).format(new Date(iso)) : '–';
const fmtDT   = iso => iso ? new Intl.DateTimeFormat('de-DE',{timeZone:'Europe/Berlin',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}).format(new Date(iso)) : '–';
const fmtTime = iso => iso ? new Intl.DateTimeFormat('de-DE',{timeZone:'Europe/Berlin',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(iso)) : '–';

const DOC_CAT_LABELS = { vertraege: 'Verträge', rechnungen: 'Rechnungen', notizen: 'Notizen', sonstiges: 'Sonstiges' };
function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function stamp() {
  document.getElementById('lastUpdate').textContent = 'Stand: ' + fmtDT(new Date().toISOString());
}

/* ── Modal helpers ── */
function openModal(html) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal() {
  document.querySelector('.modal-overlay')?.remove();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ═══════════════════════════════════════════════════════════════════════════
   TRIPS
═══════════════════════════════════════════════════════════════════════════ */
async function loadTrips() {
  const c = document.getElementById('content');
  try {
    const [trips, docs, allLinks] = await Promise.all([apiFetch('/api/trips'), apiFetch('/api/documents'), apiFetch('/api/links').catch(() => [])]);
    _tripsCache = trips;
    _docsCache = docs;
    if (!trips.length) { c.innerHTML = '<div class="empty">Keine Reisen vorhanden.<br><button class="btn btn-primary" style="margin-top:12px" onclick="newTrip()">+ Neue Reise</button></div>'; return; }
    const today = new Date().toISOString().slice(0,10);
    c.innerHTML = '<div style="margin-bottom:16px"><button class="btn btn-primary" onclick="newTrip()">+ Neue Reise</button></div>' + trips.map(t => {
      const active   = t.start_date <= today && t.end_date >= today;
      const upcoming = !active && t.start_date > today;
      const badge = active
        ? '<span class="badge badge-green">Aktiv</span>'
        : upcoming
          ? '<span class="badge badge-blue">Geplant</span>'
          : '<span class="badge badge-muted">Vergangen</span>';

      const meta = [
        t.currency         && `<div class="mi"><span class="ml">💶 Währung </span>${esc(t.currency)}</div>`,
        t.exchange_rate_eur&& `<div class="mi"><span class="ml">💱 Kurs </span>${esc(t.exchange_rate_eur)}</div>`,
        t.visa_de          && `<div class="mi"><span class="ml">🛂 Visum </span>${esc(t.visa_de)}</div>`,
        t.distance_km      && `<div class="mi"><span class="ml">📏 Luftlinie </span>${t.distance_km} km</div>`,
        t.travel_mode      && `<div class="mi"><span class="ml">🚀 Verkehr </span>${esc(t.travel_mode)}</div>`,
        t.door_to_door_estimate && `<div class="mi"><span class="ml">⏱ Haustür↔Haustür </span>${esc(t.door_to_door_estimate)}</div>`,
        `<div class="mi"><span class="ml">🌡 Klima </span>${esc(t.climate||'–')}</div>`,
        `<div class="mi"><span class="ml">🎯 Aktivitäten </span>${esc((t.activities||[]).join(', '))||'–'}</div>`,
      ].filter(Boolean).join('');

      const segs = t.segments?.length ? `
        <div class="segments">
          <div class="seg-header">Segmente (${t.segments.length})</div>
          ${t.segments.map(s => `<div class="seg-row">
            <span class="badge badge-muted">${esc(s.type)}</span>
            <span>${esc(s.title)}</span>
            <span style="color:var(--muted);font-size:12px">${esc(s.datetime_local)} (${esc(s.timezone)})</span>
            ${s.confirmation ? `<span style="color:var(--green);font-size:12px">✔ ${esc(s.confirmation)}</span>` : ''}
          </div>`).join('')}
        </div>` : '';

      const tripDocs = docs.filter(d => d.tripId === t.id);
      const docsSection = tripDocs.length ? `
        <div class="segments">
          <div class="seg-header">📁 Dokumente (${tripDocs.length})</div>
          ${tripDocs.map(d => {
            const dlUrl = '/dashboard/api/documents/download/' + encodeURIComponent(d.path) + '?token=' + encodeURIComponent(TOKEN);
            return `<div class="seg-row">
              <span class="badge badge-blue">${esc(DOC_CAT_LABELS[d.kategorie] || d.kategorie)}</span>
              <a href="${esc(dlUrl)}" style="color:var(--text);text-decoration:none" download>${esc(d.name.replace(/^\d+_/, ''))}</a>
              <span style="color:var(--muted);font-size:12px">${fmtSize(d.size)} · ${fmtDate(d.date)}</span>
            </div>`;
          }).join('')}
        </div>` : '';

      const tripLinks = (allLinks || []).filter(l => l.entityType === 'trip' && l.entityId === t.id);
      const linksSection = tripLinks.length ? `
        <div class="segments">
          <div class="seg-header">📎 Verknüpfte Dokumente (${tripLinks.length})</div>
          ${tripLinks.map(l => {
            const lIcon = l.docType === 'sharepoint' ? '☁️' : '📁';
            const lName = l.docType === 'sharepoint' ? esc(l.spName || '') : esc(l.localName || '');
            const lLink = l.docType === 'sharepoint' && l.spWebUrl
              ? `<a href="${esc(l.spWebUrl)}" target="_blank" style="color:var(--accent);text-decoration:none">${lName}</a>`
              : lName;
            return `<div class="seg-row" style="display:flex;align-items:center;gap:8px">
              <span>${lIcon}</span>
              <span style="font-weight:500">${esc(l.label)}</span>
              <span style="color:var(--muted);font-size:13px">— ${lLink}</span>
              <button class="btn btn-danger" style="padding:2px 8px;font-size:11px;margin-left:auto"
                onclick="event.stopPropagation();unlinkAndReload('${esc(l.id)}')">✕</button>
            </div>`;
          }).join('')}
        </div>` : '';

      return `<div class="trip-card" id="tc-${esc(t.id)}">
        <div class="trip-top">
          <div>
            <h3>${esc(t.name)} ${badge}</h3>
            <div class="trip-dates">📅 ${esc(t.start_date)} → ${esc(t.end_date)} &nbsp;|&nbsp; 📍 ${esc(t.destination||'–')} ${t.country_code?`(${esc(t.country_code)})`:''}</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-primary" onclick="linkDocModal('trip','${esc(t.id)}','loadTripsRefresh')">📎</button>
            <button class="btn btn-primary" onclick="editTrip('${esc(t.id)}')">✏️ Bearbeiten</button>
            <button class="btn btn-danger" onclick="deleteTrip('${esc(t.id)}','${esc(t.name)}')">🗑 Löschen</button>
          </div>
        </div>
        <div class="trip-grid">${meta}</div>
        ${segs}
        ${docsSection}
        ${linksSection}
      </div>`;
    }).join('');
    stamp();
  } catch(e) { c.innerHTML = `<div class="empty">Fehler: ${esc(e.message)}</div>`; }
}

async function deleteTrip(id, name) {
  if (!confirm(`Reise "${name}" wirklich löschen?`)) return;
  try {
    await apiFetch(`/api/trips/${encodeURIComponent(id)}`, { method: 'DELETE' });
    document.getElementById(`tc-${id}`)?.remove();
    if (!document.querySelector('.trip-card')) {
      document.getElementById('content').innerHTML = '<div class="empty">Keine Reisen.</div>';
    }
  } catch(e) { alert(`Fehler: ${e.message}`); }
}

/* ── New trip ── */
function newTrip() {
  openModal(`
    <h3>+ Neue Reise anlegen</h3>
    <label>ID (Slug, z.B. tokyo-2026-05)</label>
    <input id="mn-id" placeholder="tokyo-2026-05">
    <label>Name</label>
    <input id="mn-name" placeholder="Tokyo Mai 2026">
    <label>Ziel</label>
    <input id="mn-dest" placeholder="Tokyo, Japan">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><label>Startdatum</label><input id="mn-start" type="date"></div>
      <div><label>Enddatum</label><input id="mn-end" type="date"></div>
    </div>
    <label>Klima (optional)</label>
    <input id="mn-climate" placeholder="z.B. warm, sonnig">
    <label>Aktivitäten (optional, kommagetrennt)</label>
    <input id="mn-activities" placeholder="z.B. Sightseeing, Kulinarik">
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="createTrip()">✈️ Erstellen</button>
    </div>
  `);
}

async function createTrip() {
  const id         = document.getElementById('mn-id').value.trim();
  const name       = document.getElementById('mn-name').value.trim();
  const destination= document.getElementById('mn-dest').value.trim();
  const start_date = document.getElementById('mn-start').value;
  const end_date   = document.getElementById('mn-end').value;
  const climate    = document.getElementById('mn-climate').value.trim();
  const activities = document.getElementById('mn-activities').value.split(',').map(s=>s.trim()).filter(Boolean);
  if (!id || !name || !start_date || !end_date) return alert('ID, Name, Start- und Enddatum sind Pflichtfelder.');
  try {
    await apiFetch('/api/trips', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, name, destination, start_date, end_date, climate, activities })
    });
    closeModal();
    showTab('trips');
  } catch(e) { alert(`Fehler: ${e.message}`); }
}

/* ── Trip editing ── */
function editTrip(id) {
  const t = _tripsCache.find(x => x.id === id);
  if (!t) return alert('Trip nicht gefunden');
  window._editSegments = (t.segments || []).map(s => ({
    type:           s.type           || '',
    title:          s.title          || '',
    datetime_local: s.datetime_local || '',
    timezone:       s.timezone       || '',
    confirmation:   s.confirmation   || '',
  }));
  const segList = () => {
    if (!window._editSegments.length) {
      return '<span style="color:var(--muted)">Keine Segmente vorhanden.</span>';
    }
    return window._editSegments.map((s, i) =>
      `<div class="seg-item">
        <span class="badge badge-muted">${esc(s.type)}</span>
        <span>${esc(s.title)}</span>
        <span style="color:var(--muted);font-size:12px">${esc(s.datetime_local)} ${esc(s.timezone)}</span>
        ${s.confirmation ? `<span style="color:var(--green);font-size:12px">✔ ${esc(s.confirmation)}</span>` : ''}
        <button class="seg-rm" onclick="removeSegment(${i},'${esc(id)}')" title="Entfernen">✕</button>
      </div>`).join('');
  };
  openModal(`
    <h3>✏️ Reise bearbeiten</h3>
    <label>Titel</label>
    <input id="m-name" value="${esc(t.name||'')}">
    <label>Ziel</label>
    <input id="m-dest" value="${esc(t.destination||'')}">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><label>Startdatum</label><input id="m-start" type="date" value="${esc(t.start_date||'')}"></div>
      <div><label>Enddatum</label><input id="m-end" type="date" value="${esc(t.end_date||'')}"></div>
    </div>
    <label>Klima</label>
    <input id="m-climate" value="${esc(t.climate||'')}">
    <label>Aktivitäten (kommagetrennt)</label>
    <input id="m-activities" value="${esc((t.activities||[]).join(', '))}">
    <label>Segmente</label>
    <div id="m-seglist">${segList()}</div>
    <button class="btn btn-primary" style="margin-top:8px" onclick="addSegmentModal('${esc(id)}')">+ Segment hinzufügen</button>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveTrip('${esc(id)}')">💾 Speichern</button>
    </div>
  `);
}

async function saveTrip(id) {
  const name       = document.getElementById('m-name').value.trim();
  const destination= document.getElementById('m-dest').value.trim();
  const start_date = document.getElementById('m-start').value;
  const end_date   = document.getElementById('m-end').value;
  const climate    = document.getElementById('m-climate').value.trim();
  const activities = document.getElementById('m-activities').value.split(',').map(s=>s.trim()).filter(Boolean);
  const segments   = window._editSegments || [];
  try {
    await apiFetch(`/api/trips/${encodeURIComponent(id)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, destination, start_date, end_date, climate, activities, segments })
    });
    closeModal();
    showTab('trips');
  } catch(e) { alert(`Fehler: ${e.message}`); }
}

function addSegmentModal(tripId) {
  openModal(`
    <h3>+ Segment hinzufügen</h3>
    <label>Typ</label>
    <select id="ms-type">
      <option value="flight">✈️ Flug</option>
      <option value="train">🚆 Zug</option>
      <option value="hotel">🏨 Hotel</option>
      <option value="car">🚗 Auto</option>
      <option value="activity">🎯 Aktivität</option>
      <option value="other">📦 Sonstiges</option>
    </select>
    <label>Titel</label>
    <input id="ms-title" placeholder="z.B. LH1234 FRA→BCN">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><label>Datum</label><input id="ms-date" type="date"></div>
      <div><label>Uhrzeit</label><input id="ms-time" type="time"></div>
    </div>
    <label>Zeitzone</label>
    <input id="ms-tz" value="Europe/Berlin" placeholder="Europe/Berlin">
    <div class="modal-actions">
      <button class="btn-ghost" onclick="editTrip('${esc(tripId)}')">← Zurück</button>
      <button class="btn btn-primary" onclick="confirmAddSegment('${esc(tripId)}')">Hinzufügen</button>
    </div>
  `);
}

function confirmAddSegment(tripId) {
  const type  = document.getElementById('ms-type').value;
  const title = document.getElementById('ms-title').value.trim();
  const date  = document.getElementById('ms-date').value;
  const time  = document.getElementById('ms-time').value;
  const tz    = document.getElementById('ms-tz').value.trim() || 'Europe/Berlin';
  if (!title) return alert('Titel ist erforderlich');
  const datetime_local = date && time ? `${date}T${time}` : date || '';
  window._editSegments.push({ type, title, datetime_local, timezone: tz });
  editTrip(tripId);
}

function removeSegment(index, tripId) {
  window._editSegments.splice(index, 1);
  editTrip(tripId);
}

/* ═══════════════════════════════════════════════════════════════════════════
   HEALTH
═══════════════════════════════════════════════════════════════════════════ */
async function loadHealth() {
  const c = document.getElementById('content');
  try {
    const [entries, trends, alerts, weightData, sleepData] = await Promise.all([
      apiFetch('/api/health?days=90'),
      apiFetch('/api/health/trends?days=30'),
      apiFetch('/api/health/alerts'),
      apiFetch('/api/health/chart-data?type=weight&days=90'),
      apiFetch('/api/health/chart-data?type=sleep&days=30'),
    ]);

    if (!entries.length && !alerts.length) {
      c.innerHTML = '<div class="empty">Keine Health-Daten in den letzten 90 Tagen.</div>';
      return;
    }

    // ── Alerts Box ──
    let alertsHtml = '';
    if (alerts.length) {
      const sevIcon = { critical: '🔴', warning: '⚠️', info: 'ℹ️' };
      const sevColor = { critical: 'var(--red)', warning: 'var(--yellow)', info: 'var(--accent)' };
      const alertItems = alerts.map(a =>
        `<div style="padding:8px 12px;border-left:3px solid ${sevColor[a.severity]||'var(--muted)'};margin-bottom:6px;background:rgba(255,255,255,.03);border-radius:0 6px 6px 0">
          <span>${sevIcon[a.severity]||'•'}</span> ${esc(a.message)}
        </div>`
      ).join('');
      alertsHtml = `<div class="card card-pad" style="margin-bottom:16px">
        <div style="font-weight:600;margin-bottom:10px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">🚨 Aktive Alerts</div>
        ${alertItems}
      </div>`;
    }

    // ── Summary cards ──
    const byType = t => entries.filter(e => e.type === t);
    const weights = byType('weight');
    const lastW = weights[0];
    const lastSleep = byType('sleep')[0];
    const lastStep = byType('steps')[0];

    const wt = trends.weight;
    let trendHtml = '';
    if (wt) {
      const col = wt.change <= 0 ? 'var(--green)' : 'var(--red)';
      const arrow = wt.direction === 'up' ? '📈' : wt.direction === 'down' ? '📉' : '➡️';
      trendHtml = `<div class="s-card"><div class="lbl">Gewicht-Trend 30 T</div><div class="val" style="color:${col};font-size:22px">${arrow} ${wt.change>0?'+':''}${wt.change} kg</div><div class="sub">Ø ${wt.avg} kg (${wt.dataPoints} Messungen)</div></div>`;
    }

    const st = trends.sleep;
    let sleepTrendHtml = '';
    if (st) {
      sleepTrendHtml = `<div class="s-card"><div class="lbl">Schlaf-Trend 30 T</div><div class="val" style="font-size:22px">Ø ${st.avgDuration}h</div><div class="sub">${st.minDuration}–${st.maxDuration}h${st.avgQuality ? ' | Score '+st.avgQuality+'%' : ''}</div></div>`;
    }

    const hr = trends.heartrate;
    let hrHtml = '';
    if (hr) {
      hrHtml = `<div class="s-card"><div class="lbl">❤️ Ruheherzfrequenz</div><div class="val">${hr.current} <small style="font-size:16px">bpm</small></div><div class="sub">Ø ${hr.avg} bpm (30 T, ${hr.dataPoints} Messungen)</div></div>`;
    }

    const summaryGrid = `<div class="summary-grid">
      ${lastW ? `<div class="s-card"><div class="lbl">Gewicht (aktuell)</div><div class="val">${lastW.value} <small style="font-size:16px">${lastW.unit||'kg'}</small></div><div class="sub">${fmtDate(lastW.timestamp)}</div></div>` : ''}
      ${trendHtml}
      ${lastSleep ? `<div class="s-card"><div class="lbl">Schlaf (letzte Nacht)</div><div class="val">${lastSleep.value} <small style="font-size:16px">${lastSleep.unit||'h'}</small></div><div class="sub">${fmtDate(lastSleep.timestamp)}${lastSleep.quality ? ' | Score '+lastSleep.quality : ''}</div></div>` : ''}
      ${sleepTrendHtml}
      ${hrHtml}
      ${lastStep ? `<div class="s-card"><div class="lbl">Schritte (zuletzt)</div><div class="val" style="font-size:20px">${Number(lastStep.value).toLocaleString('de-DE')}</div><div class="sub">${fmtDate(lastStep.timestamp)}</div></div>` : ''}
    </div>`;

    // ── Weight Chart (SVG line, 90 days) ──
    let weightChartHtml = '';
    if (weightData.length >= 2) {
      weightChartHtml = `<div class="card card-pad" style="margin-bottom:16px">
        <div style="font-weight:600;margin-bottom:12px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">⚖️ Gewichtsverlauf (90 Tage)</div>
        <div style="position:relative;width:100%;overflow-x:auto">
          <svg id="weightChart" width="100%" height="220" style="min-width:600px"></svg>
        </div>
      </div>`;
    }

    // ── Sleep Chart (SVG bars, 30 days) ──
    let sleepChartHtml = '';
    if (sleepData.length >= 2) {
      sleepChartHtml = `<div class="card card-pad" style="margin-bottom:16px">
        <div style="font-weight:600;margin-bottom:12px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">😴 Schlaf (30 Tage)</div>
        <div style="position:relative;width:100%;overflow-x:auto">
          <svg id="sleepChart" width="100%" height="220" style="min-width:600px"></svg>
        </div>
      </div>`;
    }

    c.innerHTML = alertsHtml + summaryGrid + weightChartHtml + sleepChartHtml;

    // ── Render Charts ──
    if (weightData.length >= 2) renderWeightChart(weightData);
    if (sleepData.length >= 2) renderSleepChart(sleepData);

    stamp();
  } catch(e) { c.innerHTML = `<div class="empty">Fehler: ${esc(e.message)}</div>`; }
}

function renderWeightChart(data) {
  const svg = document.getElementById('weightChart');
  if (!svg) return;
  const W = svg.clientWidth || 600, H = 200;
  const pad = { t: 10, r: 15, b: 30, l: 50 };
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  const vals = data.map(d => d.value);
  const vMin = Math.floor(Math.min(...vals) - 0.5);
  const vMax = Math.ceil(Math.max(...vals) + 0.5);
  const xScale = i => pad.l + (i / (data.length - 1)) * cw;
  const yScale = v => pad.t + ch - ((v - vMin) / (vMax - vMin)) * ch;

  // Grid lines
  let svgContent = '';
  const steps = 5;
  for (let i = 0; i <= steps; i++) {
    const v = vMin + (vMax - vMin) * (i / steps);
    const y = yScale(v);
    svgContent += `<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`;
    svgContent += `<text x="${pad.l-6}" y="${y+4}" fill="var(--muted)" font-size="10" text-anchor="end">${v.toFixed(1)}</text>`;
  }

  // X-axis labels (every ~7th point)
  const step = Math.max(1, Math.floor(data.length / 8));
  for (let i = 0; i < data.length; i += step) {
    const x = xScale(i);
    const d = data[i].date.slice(5); // MM-DD
    svgContent += `<text x="${x}" y="${H-5}" fill="var(--muted)" font-size="10" text-anchor="middle">${d}</text>`;
  }

  // Line
  const points = data.map((d, i) => `${xScale(i).toFixed(1)},${yScale(d.value).toFixed(1)}`).join(' ');
  svgContent += `<polyline points="${points}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>`;

  // Trend line (linear regression)
  const n = data.length;
  const xMean = (n - 1) / 2;
  const yMean = vals.reduce((a, b) => a + b, 0) / n;
  let num = 0, den = 0;
  for (let i = 0; i < n; i++) { num += (i - xMean) * (vals[i] - yMean); den += (i - xMean) ** 2; }
  const slope = den ? num / den : 0;
  const intercept = yMean - slope * xMean;
  const ty0 = yScale(intercept);
  const ty1 = yScale(slope * (n - 1) + intercept);
  svgContent += `<line x1="${pad.l}" y1="${ty0}" x2="${W-pad.r}" y2="${ty1}" stroke="var(--yellow)" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>`;

  // Dots
  data.forEach((d, i) => {
    svgContent += `<circle cx="${xScale(i).toFixed(1)}" cy="${yScale(d.value).toFixed(1)}" r="3" fill="var(--accent)" opacity="0.8"><title>${d.date}: ${d.value} kg</title></circle>`;
  });

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = svgContent;
}

function renderSleepChart(data) {
  const svg = document.getElementById('sleepChart');
  if (!svg) return;
  const W = svg.clientWidth || 600, H = 200;
  const pad = { t: 10, r: 15, b: 30, l: 50 };
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  const maxH = Math.ceil(Math.max(...data.map(d => d.duration)) + 0.5);
  const barW = Math.max(4, Math.min(20, cw / data.length - 2));
  const xScale = i => pad.l + (i + 0.5) * (cw / data.length);
  const yScale = v => pad.t + ch - (v / maxH) * ch;

  let svgContent = '';

  // Grid lines
  for (let h = 0; h <= maxH; h += 2) {
    const y = yScale(h);
    svgContent += `<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`;
    svgContent += `<text x="${pad.l-6}" y="${y+4}" fill="var(--muted)" font-size="10" text-anchor="end">${h}h</text>`;
  }

  // Bars
  data.forEach((d, i) => {
    const x = xScale(i) - barW / 2;
    const barH = (d.duration / maxH) * ch;
    const y = pad.t + ch - barH;
    const color = d.duration < 6 ? 'var(--red)' : d.duration < 7 ? 'var(--yellow)' : 'var(--green)';
    svgContent += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${color}" opacity="0.75" rx="2"><title>${d.date}: ${d.duration}h${d.quality ? ' (Score: '+d.quality+'%)' : ''}</title></rect>`;
  });

  // X-axis labels
  const step = Math.max(1, Math.floor(data.length / 8));
  for (let i = 0; i < data.length; i += step) {
    const x = xScale(i);
    svgContent += `<text x="${x}" y="${H-5}" fill="var(--muted)" font-size="10" text-anchor="middle">${data[i].date.slice(5)}</text>`;
  }

  // 6h reference line
  const y6 = yScale(6);
  svgContent += `<line x1="${pad.l}" y1="${y6}" x2="${W-pad.r}" y2="${y6}" stroke="var(--red)" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>`;
  svgContent += `<text x="${W-pad.r+2}" y="${y6+3}" fill="var(--red)" font-size="9" opacity="0.6">6h</text>`;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = svgContent;
}

/* ═══════════════════════════════════════════════════════════════════════════
   DRAFTS

async function loadDrafts() {
  const c = document.getElementById('content');
  try {
    const [drafts, draftLinks] = await Promise.all([apiFetch('/api/drafts'), apiFetch('/api/links').catch(() => [])]);
    _draftsCache = drafts;
    if (!drafts.length) { c.innerHTML = '<div class="empty">Keine Drafts vorhanden.</div>'; return; }
    const statusBadge = s => ({'draft':'badge-yellow','approved':'badge-blue','sent':'badge-green'}[s]||'badge-muted');
    const rows = drafts.map(d => {
      const dLinks = (draftLinks || []).filter(l => l.entityType === 'draft' && l.entityId === d.id);
      const dLinksHtml = dLinks.length ? dLinks.map(l => {
        const li = l.docType === 'sharepoint' ? '☁️' : '📁';
        const ln = l.docType === 'sharepoint' && l.spWebUrl
          ? `<a href="${esc(l.spWebUrl)}" target="_blank" style="color:var(--accent)">${esc(l.spName||'')}</a>`
          : esc(l.localName||'');
        return `${li}${esc(l.label)}:${ln}`;
      }).join(' ') : '';
      return `
      <tr style="cursor:pointer" onclick="toggleDraft('${esc(d.id)}')">
        <td style="white-space:nowrap">${fmtDate(d.createdAt)}</td>
        <td><span class="badge badge-blue">${esc(d.account||'–')}</span></td>
        <td><span class="badge ${statusBadge(d.status)}">${esc(d.status||'–')}</span></td>
        <td>${esc(d.subject||'–')}${dLinksHtml ? `<div style="font-size:11px;margin-top:2px">${dLinksHtml}</div>` : ''}</td>
        <td style="color:var(--muted);font-size:12px">${esc((d.to||[]).join(', '))}</td>
        <td style="white-space:nowrap" onclick="event.stopPropagation()">
          <button class="btn btn-primary" style="padding:4px 8px;font-size:12px" onclick="linkDocModal('draft','${esc(d.id)}','loadDraftsRefresh')">📎</button>
          <button class="btn btn-primary" style="padding:4px 8px;font-size:12px" onclick="editDraft('${esc(d.id)}')">✏️</button>
          <button class="btn btn-danger" style="padding:4px 8px;font-size:12px" onclick="deleteDraft('${esc(d.id)}','${esc(d.subject)}')">🗑</button>
        </td>
      </tr>
      <tr id="db-${esc(d.id)}" style="display:none" class="draft-body-row">
        <td colspan="6"><div class="draft-body">${esc(d.bodyText||'(kein Body)')}</div></td>
      </tr>`;
    }).join('');
    c.innerHTML = `<div class="card"><table>
      <thead><tr><th>Erstellt</th><th>Konto</th><th>Status</th><th>Betreff</th><th>An</th><th>Aktionen</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div><p style="color:var(--muted);font-size:12px;padding:4px 2px">Zeile klicken = Body einblenden</p>`;
    stamp();
  } catch(e) { c.innerHTML = `<div class="empty">Fehler: ${esc(e.message)}</div>`; }
}

function toggleDraft(id) {
  const r = document.getElementById(`db-${id}`);
  if (r) r.style.display = r.style.display === 'none' ? '' : 'none';
}

function editDraft(id) {
  const d = _draftsCache.find(x => x.id === id);
  if (!d) return alert('Draft nicht gefunden');
  openModal(`
    <h3>✏️ Draft bearbeiten</h3>
    <label>An (kommagetrennt)</label>
    <input id="md-to" value="${esc((d.to||[]).join(', '))}">
    <label>Betreff</label>
    <input id="md-subject" value="${esc(d.subject||'')}">
    <label>Nachricht</label>
    <textarea id="md-body">${esc(d.bodyText||'')}</textarea>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveDraft('${esc(id)}')">💾 Speichern</button>
    </div>
  `);
}

async function saveDraft(id) {
  const to       = document.getElementById('md-to').value.split(',').map(s=>s.trim()).filter(Boolean);
  const subject  = document.getElementById('md-subject').value.trim();
  const bodyText = document.getElementById('md-body').value;
  try {
    await apiFetch(`/api/drafts/${encodeURIComponent(id)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to, subject, bodyText })
    });
    closeModal();
    showTab('drafts');
  } catch(e) { alert(`Fehler: ${e.message}`); }
}

async function deleteDraft(id, subject) {
  if (!confirm(`Draft "${subject}" wirklich löschen?`)) return;
  try {
    await apiFetch(`/api/drafts/${encodeURIComponent(id)}`, { method: 'DELETE' });
    showTab('drafts');
  } catch(e) { alert(`Fehler: ${e.message}`); }
}

/* ═══════════════════════════════════════════════════════════════════════════
   CALENDAR
═══════════════════════════════════════════════════════════════════════════ */
let _calCache = [];

function calDatePart(iso) { return (iso || '').slice(0, 10); }
function calTimePart(iso) { return (iso || '').slice(11, 16); }

async function loadCalendar() {
  const c = document.getElementById('content');
  try {
    const [events, calLinks] = await Promise.all([apiFetch('/api/calendar'), apiFetch('/api/links').catch(() => [])]);
    _calCache = events;

    const tz = 'Europe/Berlin';
    const dayKey   = iso => new Intl.DateTimeFormat('en-CA',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date(iso));
    const dayLabel = iso => new Intl.DateTimeFormat('de-DE',{timeZone:tz,weekday:'long',day:'numeric',month:'long',year:'numeric'}).format(new Date(iso));

    const toolbar = '<div style="margin-bottom:16px"><button class="btn btn-primary" onclick="newEventModal()">+ Neuer Termin</button></div>';

    if (!events.length) { c.innerHTML = toolbar + '<div class="empty">Keine Termine in den nächsten 7 Tagen.</div>'; return; }

    const groups = {};
    for (const ev of events) {
      const k = dayKey(ev.start?.dateTime || ev.start?.date || new Date().toISOString());
      (groups[k] = groups[k] || []).push(ev);
    }

    const html = Object.keys(groups).sort().map(k => {
      const evs = groups[k].sort((a,b) => (a.start.dateTime||'').localeCompare(b.start.dateTime||''));
      return `<div class="day-group">
        <div class="day-lbl">📅 ${dayLabel(evs[0].start.dateTime||k)}</div>
        ${evs.map(ev => {
          const allDay = ev.isAllDay;
          const time   = allDay ? 'Ganztag' : `${fmtTime(ev.start.dateTime)} – ${fmtTime(ev.end.dateTime)}`;
          const loc    = ev.location?.displayName ? `📍 ${esc(ev.location.displayName)}` : '';
          const teams  = ev.onlineMeeting?.joinUrl ? '🔗 Online-Meeting' : '';
          const sub    = [loc, teams].filter(Boolean).join(' &nbsp;|&nbsp; ');
          const evId   = ev.id || '';
          const evLinks = (calLinks || []).filter(l => l.entityType === 'calendar' && l.entityId === evId);
          const evLinksHtml = evLinks.length ? `<div class="ev-sub" style="margin-top:4px">${evLinks.map(l => {
            const li = l.docType === 'sharepoint' ? '☁️' : '📁';
            const ln = l.docType === 'sharepoint' && l.spWebUrl
              ? `<a href="${esc(l.spWebUrl)}" target="_blank" style="color:var(--accent)">${esc(l.spName||'')}</a>`
              : esc(l.localName||'');
            return `${li} ${esc(l.label)}: ${ln} <button class="btn btn-danger" style="padding:1px 5px;font-size:10px" onclick="event.stopPropagation();unlinkAndReload('${esc(l.id)}')">✕</button>`;
          }).join(' &nbsp; ')}</div>` : '';
          return `<div class="ev-row">
            <div class="ev-time">${time}</div>
            <div class="ev-body" style="flex:1">
              <div class="ev-title">${esc(ev.subject||'(kein Titel)')}</div>
              ${sub ? `<div class="ev-sub">${sub}</div>` : ''}
              ${ev.bodyPreview ? `<div class="ev-sub" style="margin-top:2px">${esc(ev.bodyPreview.slice(0,120))}${ev.bodyPreview.length>120?'…':''}</div>` : ''}
              ${evLinksHtml}
            </div>
            <div style="display:flex;gap:6px;align-items:center;white-space:nowrap">
              <button class="btn btn-primary" style="padding:4px 8px;font-size:12px" onclick="linkDocModal('calendar','${esc(evId)}','loadCalendarRefresh')">📎</button>
              <button class="btn btn-primary" style="padding:4px 8px;font-size:12px" onclick="editEventModal('${esc(evId)}')">✏️</button>
              <button class="btn btn-danger" style="padding:4px 8px;font-size:12px" onclick="deleteEvent('${esc(evId)}','${esc(ev.subject||'')}')">🗑</button>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');

    c.innerHTML = toolbar + html;
    stamp();
  } catch(e) { c.innerHTML = `<div class="empty">Fehler: ${esc(e.message)}</div>`; }
}

async function createEvent() {
  const subject = document.getElementById('ce-subject').value.trim();
  const date    = document.getElementById('ce-date').value;
  const tStart  = document.getElementById('ce-start').value;
  const tEnd    = document.getElementById('ce-end').value;
  const loc     = document.getElementById('ce-loc').value.trim();
  const body    = document.getElementById('ce-body').value.trim();
  if (!subject || !date || !tStart || !tEnd) return alert('Titel, Datum, Start- und Endzeit sind Pflichtfelder.');
  const btn = document.getElementById('ce-save');
  btn.disabled = true; btn.textContent = 'Speichern…';
  try {
    await apiFetch('/api/calendar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        subject,
        start: `${date}T${tStart}:00`,
        end:   `${date}T${tEnd}:00`,
        location: loc || undefined,
        body: body || undefined,
      }),
    });
    closeModal();
    showTab('calendar');
  } catch (e) { alert(`Fehler: ${e.message}`); btn.disabled = false; btn.textContent = '📅 Erstellen'; }
}

function editEventModal(eventId) {
  const ev = _calCache.find(e => e.id === eventId);
  if (!ev) return alert('Termin nicht gefunden');
  const startDT = ev.start?.dateTime || '';
  const endDT   = ev.end?.dateTime   || '';
  openModal(`
    <h3>✏️ Termin bearbeiten</h3>
    <label>Titel</label>
    <input id="ee-subject" value="${esc(ev.subject||'')}">
    <label>Datum</label>
    <input id="ee-date" type="date" value="${esc(calDatePart(startDT))}">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><label>Start</label><input id="ee-start" type="time" value="${esc(calTimePart(startDT))}"></div>
      <div><label>Ende</label><input id="ee-end" type="time" value="${esc(calTimePart(endDT))}"></div>
    </div>
    <label>Ort</label>
    <input id="ee-loc" value="${esc(ev.location?.displayName||'')}">
    <label>Beschreibung</label>
    <textarea id="ee-body" style="min-height:80px">${esc(ev.bodyPreview||'')}</textarea>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" id="ee-save" onclick="saveEvent('${esc(eventId)}')">💾 Speichern</button>
    </div>
  `);
}

async function saveEvent(eventId) {
  const subject = document.getElementById('ee-subject').value.trim();
  const date    = document.getElementById('ee-date').value;
  const tStart  = document.getElementById('ee-start').value;
  const tEnd    = document.getElementById('ee-end').value;
  const loc     = document.getElementById('ee-loc').value.trim();
  const body    = document.getElementById('ee-body').value.trim();
  if (!subject || !date || !tStart || !tEnd) return alert('Titel, Datum, Start- und Endzeit sind Pflichtfelder.');
  const btn = document.getElementById('ee-save');
  btn.disabled = true; btn.textContent = 'Speichern…';
  try {
    await apiFetch(`/api/calendar/${encodeURIComponent(eventId)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        subject,
        start: `${date}T${tStart}:00`,
        end:   `${date}T${tEnd}:00`,
        location: loc,
        body: body,
      }),
    });
    closeModal();
    showTab('calendar');
  } catch (e) { alert(`Fehler: ${e.message}`); btn.disabled = false; btn.textContent = '💾 Speichern'; }
}

async function deleteEvent(eventId, subject) {
  if (!confirm(`Termin "${subject}" wirklich löschen?`)) return;
  try {
    await apiFetch(`/api/calendar/${encodeURIComponent(eventId)}`, { method: 'DELETE' });
    showTab('calendar');
  } catch (e) { alert(`Fehler: ${e.message}`); }
}

const DOC_CATEGORIES = [
  { value: '', label: 'Alle Kategorien' },
  { value: 'vertraege', label: 'Verträge' },
  { value: 'rechnungen', label: 'Rechnungen' },
  { value: 'notizen', label: 'Notizen' },
  { value: 'sonstiges', label: 'Sonstiges' },
];

async function loadDocuments() {
  const c = document.getElementById('content');
  try {
    const [docs, trips] = await Promise.all([
      apiFetch('/api/documents'),
      apiFetch('/api/trips'),
    ]);
    _docsCache = docs;
    _tripsCache = trips;

    // Build filter toolbar
    const catOpts = DOC_CATEGORIES.map(o => `<option value="${esc(o.value)}">${esc(o.label)}</option>`).join('');
    const tripOpts = `<option value="">Alle Trips</option>` + trips.map(t => `<option value="${esc(t.id)}">${esc(t.name)}</option>`).join('');

    c.innerHTML = `
      <div class="doc-toolbar">
        <select id="doc-cat-filter" onchange="filterDocs()">${catOpts}</select>
        <select id="doc-trip-filter" onchange="filterDocs()">${tripOpts}</select>
        <button class="btn btn-primary" onclick="uploadDocModal()">+ Hochladen</button>
      </div>
      <div class="card" id="doc-table-wrap"></div>`;

    renderDocTable(docs, trips);
    stamp();
  } catch (e) { c.innerHTML = `<div class="empty">Fehler: ${esc(e.message)}</div>`; }
}

function renderDocTable(docs, trips) {
  const wrap = document.getElementById('doc-table-wrap');
  if (!docs.length) { wrap.innerHTML = '<div class="empty">Keine Dokumente vorhanden.</div>'; return; }
  const tripMap = {};
  for (const t of trips) tripMap[t.id] = t.name;

  const rows = docs.map(d => {
    const tripLabel = d.tripId && tripMap[d.tripId]
      ? `<a class="doc-trip-link" onclick="goToTrip('${esc(d.tripId)}')">${esc(tripMap[d.tripId])}</a>`
      : '<span style="color:var(--muted)">–</span>';
    const dlUrl = '/dashboard/api/documents/download/' + encodeURIComponent(d.path) + '?token=' + encodeURIComponent(TOKEN);
    return `<tr>
      <td>${esc(d.name.replace(/^\d+_/, ''))}</td>
      <td><span class="badge badge-blue">${esc(DOC_CAT_LABELS[d.kategorie] || d.kategorie)}</span></td>
      <td>${tripLabel}</td>
      <td style="white-space:nowrap">${fmtSize(d.size)}</td>
      <td style="white-space:nowrap">${fmtDate(d.date)}</td>
      <td style="white-space:nowrap">
        <a href="${esc(dlUrl)}" class="btn btn-primary" style="padding:4px 8px;font-size:12px;text-decoration:none" download>⬇</a>
        <button class="btn btn-danger" style="padding:4px 8px;font-size:12px" onclick="deleteDoc('${esc(d.path)}','${esc(d.name)}')">🗑</button>
      </td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table>
    <thead><tr><th>Dateiname</th><th>Kategorie</th><th>Trip</th><th>Größe</th><th>Datum</th><th>Aktionen</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function filterDocs() {
  const cat = document.getElementById('doc-cat-filter').value;
  const trip = document.getElementById('doc-trip-filter').value;
  let filtered = _docsCache;
  if (cat) filtered = filtered.filter(d => d.kategorie === cat);
  if (trip) filtered = filtered.filter(d => d.tripId === trip);
  renderDocTable(filtered, _tripsCache);
}

function goToTrip(tripId) {
  showTab('trips');
  setTimeout(() => {
    const el = document.getElementById('tc-' + tripId);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 400);
}

function uploadDocModal() {
  const catOpts = DOC_CATEGORIES.slice(1).map(o => `<option value="${esc(o.value)}">${esc(o.label)}</option>`).join('');
  const tripOpts = `<option value="">– Kein Trip –</option>` + _tripsCache.map(t => `<option value="${esc(t.id)}">${esc(t.name)}</option>`).join('');
  openModal(`
    <h3>📁 Dokument hochladen</h3>
    <label>Kategorie</label>
    <select id="upl-cat">${catOpts}</select>
    <label>Trip-Verknüpfung (optional)</label>
    <select id="upl-trip">${tripOpts}</select>
    <label>Datei</label>
    <div class="drop-zone" id="upl-drop" onclick="document.getElementById('upl-file').click()">
      Datei hierher ziehen oder klicken
    </div>
    <input type="file" id="upl-file" style="display:none" onchange="showFileName()">
    <div id="upl-fname" style="color:var(--muted);font-size:13px;margin-top:4px"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" id="upl-btn" onclick="uploadDoc()">⬆ Hochladen</button>
    </div>
  `);
  // Drag & drop
  const dz = document.getElementById('upl-drop');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    if (e.dataTransfer.files.length) {
      document.getElementById('upl-file').files = e.dataTransfer.files;
      showFileName();
    }
  });
}

function showFileName() {
  const f = document.getElementById('upl-file').files[0];
  document.getElementById('upl-fname').textContent = f ? `${f.name} (${fmtSize(f.size)})` : '';
  document.getElementById('upl-drop').textContent = f ? f.name : 'Datei hierher ziehen oder klicken';
}

async function uploadDoc() {
  const fileInput = document.getElementById('upl-file');
  if (!fileInput.files.length) return alert('Bitte eine Datei auswählen.');
  const form = new FormData();
  form.append('file', fileInput.files[0]);
  form.append('kategorie', document.getElementById('upl-cat').value);
  const tripId = document.getElementById('upl-trip').value;
  if (tripId) form.append('tripId', tripId);

  const btn = document.getElementById('upl-btn');
  btn.disabled = true; btn.textContent = 'Uploading…';
  try {
    const sep = '/api/documents/upload'.includes('?') ? '&' : '?';
    const res = await fetch('/dashboard/api/documents/upload' + sep + 'token=' + encodeURIComponent(TOKEN), {
      method: 'POST', body: form,
    });
    if (res.status === 401) { logout(); throw new Error('401'); }
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `HTTP ${res.status}`); }
    closeModal();
    showTab('documents');
  } catch (e) { alert(`Fehler: ${e.message}`); btn.disabled = false; btn.textContent = '⬆ Hochladen'; }
}

async function deleteDoc(docPath, name) {
  if (!confirm(`Dokument "${name.replace(/^\d+_/, '')}" wirklich löschen?`)) return;
  try {
    await apiFetch(`/api/documents/${encodeURIComponent(docPath)}`, { method: 'DELETE' });
    showTab('documents');
  } catch (e) { alert(`Fehler: ${e.message}`); }
}

async function spOpenDrive(driveId, folderId, folderName) {
  if (driveId) _spCurrentDriveId = driveId;
  _spCurrentFolderId = folderId || '';

  if (folderId && folderName) {
    _spBreadcrumb.push({ name: folderName, folderId });
  } else if (!folderId) {
    _spBreadcrumb = [];
  }

  const wrap = document.getElementById('sp-main');
  wrap.innerHTML = '<div class="spinner">Dateien laden…</div>';
  try {
    let url = `/api/sharepoint/files/${encodeURIComponent(_spCurrentSiteId)}/${encodeURIComponent(_spCurrentDriveId)}`;
    if (_spCurrentFolderId) url += `?folderId=${encodeURIComponent(_spCurrentFolderId)}`;
    const files = await apiFetch(url);
    _spFilesCache = files;
    renderSPFiles(files);
  } catch (e) { wrap.innerHTML = `<div class="empty">Fehler: ${esc(e.message)}</div>`; }
}

function spSortIndicator(field) {
  if (_spSortField !== field) return '';
  return _spSortDir === 'asc' ? ' ▲' : ' ▼';
}

function spToggleSort(field, rerender) {
  if (_spSortField === field) {
    _spSortDir = _spSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    _spSortField = field;
    _spSortDir = field === 'lastModifiedDateTime' ? 'desc' : 'asc';
  }
  rerender();
}

function spSortItems(items) {
  return [...items].sort((a, b) => {
    // Folders always first
    if (a.isFolder && !b.isFolder) return -1;
    if (!a.isFolder && b.isFolder) return 1;
    const dir = _spSortDir === 'asc' ? 1 : -1;
    if (_spSortField === 'name') {
      return dir * a.name.localeCompare(b.name);
    }
    const da = a.lastModifiedDateTime || '';
    const db = b.lastModifiedDateTime || '';
    return dir * da.localeCompare(db);
  });
}

function renderSPFiles(files) {
  const wrap = document.getElementById('sp-main');

  // Breadcrumb
  const crumbs = [{name: '← Drives', folderId: null}].concat(_spBreadcrumb);
  const breadcrumbHtml = crumbs.map((cr, i) => {
    if (i === 0) return `<span style="cursor:pointer;color:var(--accent)" onclick="spOpenSite('${esc(_spCurrentSiteId)}')">${esc(cr.name)}</span>`;
    if (i === crumbs.length - 1) return `<span style="color:var(--text)">${esc(cr.name)}</span>`;
    return `<span style="cursor:pointer;color:var(--accent)" onclick="spNavToCrumb(${i})">${esc(cr.name)}</span>`;
  }).join(' <span style="color:var(--muted)">›</span> ');

  const toolbar = `<div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div style="font-size:13px">${breadcrumbHtml}</div>
    <button class="btn btn-primary" style="font-size:12px" onclick="spUploadModal()">⬆ Upload</button>
  </div>`;

  if (!files.length) { wrap.innerHTML = toolbar + '<div class="empty">Keine Dateien in diesem Ordner.</div>'; return; }

  const sorted = spSortItems(files);

  const rows = sorted.map(f => {
    const icon = f.isFolder ? '📁' : '📄';
    const nameCell = f.isFolder
      ? `<td style="cursor:pointer" onclick="spOpenDrive(null,'${esc(f.id)}','${esc(f.name)}')">${icon} <strong>${esc(f.name)}</strong>${f.childCount != null ? ` <span style="color:var(--muted);font-size:11px">(${f.childCount})</span>` : ''}</td>`
      : `<td>${icon} ${esc(f.name)}</td>`;
    const sizeStr = f.isFolder ? '–' : fmtSize(f.size);
    const dateStr = f.lastModifiedDateTime ? f.lastModifiedDateTime.slice(0,10) : '–';
    const actions = f.isFolder ? '' : (f.downloadUrl
      ? `<a href="/dashboard/api/sharepoint/download?url=${encodeURIComponent(f.downloadUrl)}&token=${encodeURIComponent(TOKEN)}" class="btn btn-primary" style="padding:3px 8px;font-size:11px;text-decoration:none" download="${esc(f.name)}">⬇</a>`
      : `<a href="${esc(f.webUrl)}" target="_blank" style="color:var(--accent);font-size:12px">Öffnen ↗</a>`);
    return `<tr>
      ${nameCell}
      <td style="white-space:nowrap;color:var(--muted);font-size:12px">${sizeStr}</td>
      <td style="white-space:nowrap;color:var(--muted);font-size:12px">${dateStr}</td>
      <td style="white-space:nowrap">${actions}</td>
    </tr>`;
  }).join('');

  const thStyle = 'cursor:pointer;user-select:none';
  wrap.innerHTML = toolbar + `<table>
    <thead><tr>
      <th style="${thStyle}" onclick="spToggleSort('name', () => renderSPFiles(_spFilesCache))">Name${spSortIndicator('name')}</th>
      <th>Größe</th>
      <th style="${thStyle}" onclick="spToggleSort('lastModifiedDateTime', () => renderSPFiles(_spFilesCache))">Geändert${spSortIndicator('lastModifiedDateTime')}</th>
      <th>Aktionen</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function spNavToCrumb(index) {
  const target = _spBreadcrumb[index - 1]; // index 0 = Drives (handled separately)
  _spBreadcrumb = _spBreadcrumb.slice(0, index);
  if (target) {
    _spCurrentFolderId = target.folderId;
    const wrap = document.getElementById('sp-main');
    wrap.innerHTML = '<div class="spinner">Dateien laden…</div>';
    (async () => {
      try {
        let url = `/api/sharepoint/files/${encodeURIComponent(_spCurrentSiteId)}/${encodeURIComponent(_spCurrentDriveId)}`;
        if (_spCurrentFolderId) url += `?folderId=${encodeURIComponent(_spCurrentFolderId)}`;
        const files = await apiFetch(url);
        _spFilesCache = files;
        renderSPFiles(files);
      } catch (e) { document.getElementById('sp-main').innerHTML = `<div class="empty">Fehler: ${esc(e.message)}</div>`; }
    })();
  } else {
    spOpenDrive(_spCurrentDriveId, null, null);
  }
}

let _spSearchHits = [];

async function spSearch() {
  const input = document.getElementById('sp-search-input');
  const q = (input?.value || '').trim();
  if (!q) return;
  const wrap = document.getElementById('sp-main');
  wrap.innerHTML = '<div class="spinner">Suche…</div>';
  try {
    _spSearchHits = await apiFetch(`/api/sharepoint/search?q=${encodeURIComponent(q)}`);
    renderSPSearchHits();
  } catch (e) { wrap.innerHTML = `<div class="empty">Fehler: ${esc(e.message)}</div>`; }
}

function renderSPSearchHits() {
  const wrap = document.getElementById('sp-main');
  if (!_spSearchHits.length) { wrap.innerHTML = '<div class="empty">Keine Ergebnisse.</div>'; return; }
  const sorted = [..._spSearchHits].sort((a, b) => {
    const dir = _spSortDir === 'asc' ? 1 : -1;
    if (_spSortField === 'name') return dir * (a.name || '').localeCompare(b.name || '');
    return dir * (a.lastModifiedDateTime || '').localeCompare(b.lastModifiedDateTime || '');
  });
  const rows = sorted.map(h => {
    const sizeStr = h.size ? fmtSize(h.size) : '–';
    const dateStr = h.lastModifiedDateTime ? h.lastModifiedDateTime.slice(0,10) : '–';
    const snippet = h.summary ? `<div style="color:var(--muted);font-size:12px;margin-top:3px">${h.summary}</div>` : '';
    return `<tr>
      <td><strong>${esc(h.name)}</strong>${snippet}</td>
      <td style="white-space:nowrap;color:var(--muted);font-size:12px">${sizeStr}</td>
      <td style="white-space:nowrap;color:var(--muted);font-size:12px">${dateStr}</td>
      <td style="white-space:nowrap"><a href="${esc(h.webUrl)}" target="_blank" style="color:var(--accent);font-size:12px">Öffnen ↗</a></td>
    </tr>`;
  }).join('');
  const thStyle = 'cursor:pointer;user-select:none';
  wrap.innerHTML = `<table>
    <thead><tr>
      <th style="${thStyle}" onclick="spToggleSort('name', renderSPSearchHits)">Datei${spSortIndicator('name')}</th>
      <th>Größe</th>
      <th style="${thStyle}" onclick="spToggleSort('lastModifiedDateTime', renderSPSearchHits)">Geändert${spSortIndicator('lastModifiedDateTime')}</th>
      <th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function spUploadModal() {
  if (!_spCurrentSiteId || !_spCurrentDriveId) return alert('Bitte zuerst eine Site und Drive auswählen.');
  openModal(`
    <h3>📂 SharePoint Upload</h3>
    <label>Datei (max 4 MB)</label>
    <div class="drop-zone" id="sp-upl-drop" onclick="document.getElementById('sp-upl-file').click()">
      Datei hierher ziehen oder klicken
    </div>
    <input type="file" id="sp-upl-file" style="display:none" onchange="spShowFileName()">
    <div id="sp-upl-fname" style="color:var(--muted);font-size:13px;margin-top:4px"></div>
    <label>Pfad (optional, Standard: Dateiname)</label>
    <input type="text" id="sp-upl-path" placeholder="z.B. subfolder/datei.pdf">
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" id="sp-upl-btn" onclick="spUploadFile()">⬆ Hochladen</button>
    </div>
  `);
  const dz = document.getElementById('sp-upl-drop');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    if (e.dataTransfer.files.length) {
      document.getElementById('sp-upl-file').files = e.dataTransfer.files;
      spShowFileName();
    }
  });
}

function spShowFileName() {
  const f = document.getElementById('sp-upl-file').files[0];
  document.getElementById('sp-upl-fname').textContent = f ? `${f.name} (${fmtSize(f.size)})` : '';
  document.getElementById('sp-upl-drop').textContent = f ? f.name : 'Datei hierher ziehen oder klicken';
}

async function spUploadFile() {
  const fileInput = document.getElementById('sp-upl-file');
  if (!fileInput.files.length) return alert('Bitte eine Datei auswählen.');
  const file = fileInput.files[0];
  if (file.size > 4 * 1024 * 1024) return alert('Datei zu groß (max 4 MB).');
  const filePath = document.getElementById('sp-upl-path').value.trim() || file.name;

  const form = new FormData();
  form.append('file', file);
  form.append('siteId', _spCurrentSiteId);
  form.append('driveId', _spCurrentDriveId);
  form.append('path', filePath);

  const btn = document.getElementById('sp-upl-btn');
  btn.disabled = true; btn.textContent = 'Uploading…';
  try {
    const res = await fetch('/dashboard/api/sharepoint/upload?token=' + encodeURIComponent(TOKEN), {
      method: 'POST', body: form,
    });
    if (res.status === 401) { logout(); throw new Error('401'); }
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `HTTP ${res.status}`); }
    closeModal();
    spOpenDrive(null, _spCurrentFolderId || null, null);
  } catch (e) { alert(`Fehler: ${e.message}`); btn.disabled = false; btn.textContent = '⬆ Hochladen'; }
}

let _fleetCache = [];

function tuevInfo(tuevDate) {
  if (!tuevDate) return { cls: 'tuev-none', text: 'kein TÜV' };
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(tuevDate); d.setHours(0,0,0,0);
  const days = Math.round((d - today) / 86400000);
  const dateStr = fmtDate(tuevDate);
  if (days < 0) return { cls: 'tuev-red', text: `überfällig (${dateStr})` };
  if (days <= 30) return { cls: 'tuev-yellow', text: `in ${days}d (${dateStr})` };
  if (days <= 90) return { cls: 'tuev-yellow', text: `in ${days}d (${dateStr})` };
  return { cls: 'tuev-green', text: dateStr };
}

async function saveVehicle(id) {
  const newIdVal = document.getElementById('ev-id').value.trim().toLowerCase();
  const name  = document.getElementById('ev-name').value.trim();
  const make  = document.getElementById('ev-make').value.trim();
  const model = document.getElementById('ev-model').value.trim();
  const year  = Number(document.getElementById('ev-year').value);
  const plate = document.getElementById('ev-plate').value.trim();
  const vin   = document.getElementById('ev-vin').value.trim();
  const color = document.getElementById('ev-color').value.trim();
  const km    = document.getElementById('ev-km').value;
  const tuev  = document.getElementById('ev-tuev').value;
  const insProv = document.getElementById('ev-ins-prov').value.trim();
  const insType = document.getElementById('ev-ins-type').value.trim();
  const insCost = document.getElementById('ev-ins-cost').value;

  if (!make || !model) return alert('Hersteller und Modell sind Pflicht.');

  const body = {
    name, make, model, year,
    plate: plate || undefined,
    vin: vin || undefined,
    color: color || undefined,
    mileage: km !== '' ? Number(km) : undefined,
    tuevDate: tuev || undefined,
  };
  // Add newId if the ID was changed
  const effectiveNewId = newIdVal.startsWith('v-') ? newIdVal : 'v-' + newIdVal;
  if (effectiveNewId !== id) body.newId = effectiveNewId;
  if (insProv || insType) {
    body.insurance = {
      provider: insProv || '–',
      type: insType || '–',
      annualCost: insCost !== '' ? Number(insCost) : undefined,
    };
  }

  const btn = document.getElementById('ev-save');
  btn.disabled = true; btn.textContent = 'Speichern…';
  try {
    const saved = await apiFetch(`/api/fleet/${encodeURIComponent(id)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    closeModal();
    // Reload cache & detail (use saved.id in case ID was changed)
    _fleetCache = await apiFetch('/api/fleet');
    fleetDetail(saved.id);
  } catch (e) { alert(`Fehler: ${e.message}`); btn.disabled = false; btn.textContent = '💾 Speichern'; }
}

/* ── Add service entry ── */
function addServiceModal(vehicleId) {
  const today = new Date().toISOString().slice(0, 10);
  openModal(`
    <h3>🔧 Service-Eintrag</h3>
    <label>Datum</label>
    <input id="sv-date" type="date" value="${today}">
    <label>Typ</label>
    <select id="sv-type">
      <option value="Inspektion">Inspektion</option>
      <option value="Ölwechsel">Ölwechsel</option>
      <option value="Reifenwechsel">Reifenwechsel</option>
      <option value="Reparatur">Reparatur</option>
      <option value="TÜV/HU">TÜV/HU</option>
      <option value="Sonstiges">Sonstiges</option>
    </select>
    <label>km-Stand (optional)</label>
    <input id="sv-km" type="number" min="0">
    <label>Kosten € (optional)</label>
    <input id="sv-cost" type="number" min="0" step="0.01">
    <label>Notiz (optional)</label>
    <input id="sv-notes" placeholder="z.B. Bremsbeläge vorne gewechselt">
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" id="sv-save" onclick="saveService('${esc(vehicleId)}')">🔧 Speichern</button>
    </div>
  `);
}

async function saveService(vehicleId) {
  const date  = document.getElementById('sv-date').value;
  const type  = document.getElementById('sv-type').value;
  const km    = document.getElementById('sv-km').value;
  const cost  = document.getElementById('sv-cost').value;
  const notes = document.getElementById('sv-notes').value.trim();
  if (!date || !type) return alert('Datum und Typ sind Pflicht.');
  const btn = document.getElementById('sv-save');
  btn.disabled = true; btn.textContent = 'Speichern…';
  try {
    await apiFetch(`/api/fleet/${encodeURIComponent(vehicleId)}/service`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        date, type,
        mileage: km ? Number(km) : undefined,
        cost: cost ? Number(cost) : undefined,
        notes: notes || undefined,
      }),
    });
    closeModal();
    _fleetCache = await apiFetch('/api/fleet');
    fleetDetail(vehicleId);
  } catch (e) { alert(`Fehler: ${e.message}`); btn.disabled = false; btn.textContent = '🔧 Speichern'; }
}

/* ═══════════════════════════════════════════════════════════════════════════
   Document Links — universale Dokumenten-Verknüpfung
   ═══════════════════════════════════════════════════════════════════════════ */

async function fetchEntityLinks(entityType, entityId) {
  try {
    return await apiFetch(`/api/links/${encodeURIComponent(entityType)}/${encodeURIComponent(entityId)}`);
  } catch { return []; }
}

function renderLinksSection(links, entityType, entityId, refreshFn) {
  const rows = links.map(l => {
    const icon = l.docType === 'sharepoint' ? '☁️' : '📁';
    const name = l.docType === 'sharepoint' ? esc(l.spName || '') : esc(l.localName || '');
    const nameHtml = l.docType === 'sharepoint' && l.spWebUrl
      ? `<a href="${esc(l.spWebUrl)}" target="_blank" style="color:var(--accent);text-decoration:none">${name}</a>`
      : `<span>${name}</span>`;
    return `<div class="seg-row" style="display:flex;align-items:center;gap:8px;padding:8px 12px">
      <span title="${l.docType === 'sharepoint' ? 'SharePoint' : 'Lokal'}">${icon}</span>
      <span style="font-weight:500">${esc(l.label)}</span>
      <span style="color:var(--muted);font-size:13px">— ${nameHtml}</span>
      <span style="color:var(--muted);font-size:11px;margin-left:auto">${l.id}</span>
      <button class="btn btn-danger" style="padding:2px 8px;font-size:11px"
        onclick="unlinkDoc('${esc(l.id)}','${esc(entityType)}','${esc(entityId)}','${esc(refreshFn)}')">✕</button>
    </div>`;
  }).join('');

  return `<div class="card card-pad" style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h3 style="font-size:15px">📎 Verknüpfte Dokumente (${links.length})</h3>
      <button class="btn btn-primary" style="font-size:12px"
        onclick="linkDocModal('${esc(entityType)}','${esc(entityId)}','${esc(refreshFn)}')">+ Verknüpfen</button>
    </div>
    ${rows || '<span style="color:var(--muted)">Keine Dokumente verknüpft</span>'}
  </div>`;
}

async function unlinkDoc(linkId, entityType, entityId, refreshFn) {
  if (!confirm('Verknüpfung entfernen?')) return;
  try {
    await apiFetch(`/api/links/${encodeURIComponent(linkId)}`, { method: 'DELETE' });
    if (refreshFn && typeof window[refreshFn] === 'function') window[refreshFn](entityId);
  } catch (e) { alert(`Fehler: ${e.message}`); }
}

function linkDocModal(entityType, entityId, refreshFn) {
  openModal(`
    <h3>📎 Dokument verknüpfen</h3>
    <label>Label</label>
    <input id="ld-label" placeholder="z.B. Kaufvertrag, Rechnung, …">
    <label>SharePoint-Suche</label>
    <div style="display:flex;gap:8px">
      <input id="ld-search" placeholder="Suchbegriff" style="flex:1"
        onkeydown="if(event.key==='Enter')searchSpForLink()">
      <button class="btn btn-primary" onclick="searchSpForLink()">🔍 Suchen</button>
    </div>
    <div id="ld-results" style="margin-top:12px;max-height:300px;overflow-y:auto"></div>
    <input type="hidden" id="ld-entityType" value="${esc(entityType)}">
    <input type="hidden" id="ld-entityId" value="${esc(entityId)}">
    <input type="hidden" id="ld-refreshFn" value="${esc(refreshFn)}">
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Abbrechen</button>
    </div>
  `);
}

async function searchSpForLink() {
  const q = document.getElementById('ld-search').value.trim();
  const container = document.getElementById('ld-results');
  if (!q) { container.innerHTML = '<span style="color:var(--muted)">Suchbegriff eingeben</span>'; return; }
  container.innerHTML = '<span style="color:var(--muted)">Suche läuft…</span>';
  try {
    const results = await apiFetch(`/api/links/search/sp?q=${encodeURIComponent(q)}`);
    if (!results.length) { container.innerHTML = '<span style="color:var(--muted)">Keine Treffer</span>'; return; }
    window._spLinkResults = results;
    container.innerHTML = results.map((r, i) => `
      <div style="padding:8px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:8px"
           onclick="selectSpForLink(${i})"
           onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''">
        <span>☁️</span>
        <div style="flex:1">
          <div style="font-weight:500">${esc(r.name)}</div>
          <div style="color:var(--muted);font-size:12px">${esc(r.siteName)} › ${esc(r.path)}</div>
        </div>
        <span style="color:var(--muted);font-size:11px">${fmtSize(r.size)}</span>
      </div>
    `).join('');
  } catch (e) { container.innerHTML = `<span style="color:red">Fehler: ${esc(e.message)}</span>`; }
}

async function unlinkAndReload(linkId) {
  if (!confirm('Verknüpfung entfernen?')) return;
  try {
    await apiFetch(`/api/links/${encodeURIComponent(linkId)}`, { method: 'DELETE' });
    // Reload current tab
    const activeTab = document.querySelector('.tab.active')?.dataset?.tab;
    if (activeTab) showTab(activeTab);
  } catch (e) { alert(`Fehler: ${e.message}`); }
}

function loadTripsRefresh() { showTab('trips'); }
function loadCalendarRefresh() { showTab('calendar'); }
function loadDraftsRefresh() { showTab('drafts'); }

async function selectSpForLink(idx) {
  const r = window._spLinkResults?.[idx];
  if (!r) return;
  const label = document.getElementById('ld-label').value.trim() || r.name;
  const entityType = document.getElementById('ld-entityType').value;
  const entityId = document.getElementById('ld-entityId').value;
  const refreshFn = document.getElementById('ld-refreshFn').value;
  try {
    await apiFetch('/api/links', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entityType, entityId, docType: 'sharepoint', spItemId: r.itemId, label }),
    });
    closeModal();
    if (refreshFn && typeof window[refreshFn] === 'function') window[refreshFn](entityId);
  } catch (e) { alert(`Fehler: ${e.message}`); }
}
</script>
